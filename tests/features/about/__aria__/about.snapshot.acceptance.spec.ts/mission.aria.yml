- region "Our Mission":
  - heading "Our Mission" [level=2]
  - paragraph: BJJ Éire exists to make Irish Jiu-Jitsu more accessible. Whether you are looking for a gym to train at, a tournament to compete in, or an open mat to visit, this is the place to find it — accurate, up to date, and free.
  - paragraph: "The goal is simple: help the Irish BJJ community train more, compete more, and connect more. Every listing, filter, and fix moves that mission forward."