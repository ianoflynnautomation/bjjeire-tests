name: bjjeire-tests

services:
  playwright:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/bjjeire/playwright:local
    ipc: host
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./playwright-report:/home/pwuser/app/playwright-report
      - ./test-results:/home/pwuser/app/test-results
      - ./blob-report:/home/pwuser/app/blob-report
      - ./allure-results:/home/pwuser/app/allure-results
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /home/pwuser/.npm:size=64m
    env_file:
      - path: .env
        required: false
    environment:
      CI: 'true'
      APP_ENV: ${APP_ENV:-docker}
      BASE_URL: ${BASE_URL:-}
      API_URL: ${API_URL:-}
      ACCEPT_INVALID_CERTS: ${ACCEPT_INVALID_CERTS:-true}
      MONGO_URL: ${MONGO_URL:-}
      MONGO_DB: ${MONGO_DB:-}
      TEST_USER_EMAIL: ${TEST_USER_EMAIL:-}
      TEST_USER_PASSWORD: ${TEST_USER_PASSWORD:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      AZURE_API_SCOPE: ${AZURE_API_SCOPE:-}
      AZURE_AUTHORITY: ${AZURE_AUTHORITY:-}
