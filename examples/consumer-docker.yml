name: Smoke Tests (Docker Compose)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  actions: read
  checks: write

jobs:
  smoke_tests:
    uses: bjjeire/bjjeire-tests/.github/workflows/playwright-docker.yml@v1
    with:
      compose_files: |
        docker-compose.yml
        docker-compose.override.local.yml
        docker-compose.override.ci.yml
      compose_pre_up_script: .github/scripts/smoke-pre-up.sh
      seed_data: true
      compose_health_url: http://localhost:5003/health
      base_url: http://localhost:3000
      api_base_url: http://localhost:5003
      test_tags: '@smoke'
      playwright_projects: '["api","chromium-desktop"]'
      playwright_image: mcr.microsoft.com/playwright:v1.59.1-noble
      test_repo: bjjeire/bjjeire-tests
      test_repo_ref: v1
    secrets: inherit
