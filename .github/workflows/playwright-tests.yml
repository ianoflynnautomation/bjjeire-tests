# Reusable workflow: Playwright test runner for already-available environments.
#
# Consumers call this with `uses: <org>/<test-repo>/.github/workflows/playwright-tests.yml@<ref>`.
# This workflow is intentionally provisioning-agnostic: callers provide URLs and
# an app profile, and this workflow handles matrix execution, report merging, and
# result gating.

name: Playwright Tests

on:
  workflow_call:
    inputs:
      app_env:
        description: 'Playwright app profile: local | staging | docker'
        type: string
        required: false
        default: 'local'
      base_url:
        description: 'BASE_URL for tests.'
        type: string
        required: false
        default: ''
      api_base_url:
        description: 'API_URL for tests.'
        type: string
        required: false
        default: ''

      test_tags:
        description: 'Playwright grep filter, e.g. "@smoke|@regression".'
        type: string
        required: false
        default: '@smoke|@regression'
      shard_total:
        description: 'Number of parallel shards per project.'
        type: number
        required: false
        default: 6
      playwright_projects:
        description: 'JSON array of Playwright project names to run, e.g. ''["api","chromium-desktop","firefox-desktop"]''.'
        type: string
        required: false
        default: '["api","chromium-desktop","firefox-desktop","webkit-desktop","chromium-wide","iphone-15","pixel-8"]'

      node_version:
        description: 'Node.js version for setup-node and merge job.'
        type: string
        required: false
        default: '22'
      playwright_image:
        description: 'Container image used for the test job. Pin to your @playwright/test version.'
        type: string
        required: false
        default: 'mcr.microsoft.com/playwright:v1.58.2-noble'

      test_repo:
        description: 'Owner/repo holding the test code. Empty = caller repo (self-call from this repo).'
        type: string
        required: false
        default: ''
      test_repo_ref:
        description: 'Git ref of the test repo to check out (tag, branch, or SHA).'
        type: string
        required: false
        default: 'main'

    secrets:
      EPHEMERAL_MONGO_URL:
        required: false
      EPHEMERAL_MONGO_DB:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_CLIENT_SECRET:
        required: false
      AZURE_API_SCOPE:
        required: false
      AZURE_AUTHORITY:
        required: false

    outputs:
      test_status:
        description: 'success | failure — aggregated result of the matrix test job.'
        value: ${{ jobs.gate.outputs.status }}
      failed_count:
        description: 'Number of failed tests across all shards (0 on green).'
        value: ${{ jobs.merge-reports.outputs.failed_count }}
      report_artifact_name:
        description: 'Name of the merged HTML report artifact.'
        value: ${{ jobs.merge-reports.outputs.report_artifact_name }}

permissions:
  contents: read
  id-token: write
  actions: read
  checks: write

jobs:
  setup:
    name: Plan matrix
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.plan.outputs.shard_matrix }}
      project_matrix: ${{ steps.plan.outputs.project_matrix }}
    steps:
      - id: plan
        shell: bash
        run: |
          shards=$(seq 1 ${{ inputs.shard_total }} | jq -R -s -c 'split("\n")[:-1] | map(tonumber)')
          projects='${{ inputs.playwright_projects }}'
          project_matrix=$(echo "${projects}" | jq -c 'map({
            name: .,
            config: (if . == "api" then "playwright.api.config.ts" else "playwright.ui.config.ts" end)
          })')

          echo "shard_matrix=${shards}" >> "$GITHUB_OUTPUT"
          echo "project_matrix=${project_matrix}" >> "$GITHUB_OUTPUT"

  test:
    name: Test ${{ matrix.project.name }} ${{ matrix.shard }}/${{ inputs.shard_total }}
    runs-on: ubuntu-latest
    needs: [setup]

    container:
      image: ${{ inputs.playwright_image }}
      options: --ipc=host

    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.setup.outputs.project_matrix) }}
        shard: ${{ fromJson(needs.setup.outputs.shard_matrix) }}

    env:
      CI: 'true'
      APP_ENV: ${{ inputs.app_env }}
      BASE_URL: ${{ inputs.base_url }}
      API_URL: ${{ inputs.api_base_url }}
      MONGO_URL: ${{ secrets.EPHEMERAL_MONGO_URL }}
      MONGO_DB: ${{ secrets.EPHEMERAL_MONGO_DB }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_API_SCOPE: ${{ secrets.AZURE_API_SCOPE }}
      AZURE_AUTHORITY: ${{ secrets.AZURE_AUTHORITY }}

    steps:
      - name: Checkout test repo
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.test_repo }}
          ref: ${{ inputs.test_repo_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ inputs.playwright_image }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci --ignore-scripts

      - name: Install Playwright browsers (cache miss only)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          args=(
            -c "${{ matrix.project.config }}"
            --project="${{ matrix.project.name }}"
            --shard=${{ matrix.shard }}/${{ inputs.shard_total }}
          )
          if [ -n "${{ inputs.test_tags }}" ]; then
            args+=(--grep="${{ inputs.test_tags }}")
          fi
          npx playwright test "${args[@]}"

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.project.name }}-shard-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: traces-${{ matrix.project.name }}-shard-${{ matrix.shard }}
          path: test-results/**/*.zip
          retention-days: 7
          if-no-files-found: ignore

  merge-reports:
    name: Merge reports
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    outputs:
      failed_count: ${{ steps.summary.outputs.failed_count }}
      report_artifact_name: playwright-html-report
    steps:
      - name: Checkout test repo
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.test_repo }}
          ref: ${{ inputs.test_repo_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci --ignore-scripts

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          merge-multiple: true
          path: all-blob-reports
        continue-on-error: true

      - name: Merge into HTML + JSON
        id: merge
        shell: bash
        run: |
          if [ -z "$(ls -A all-blob-reports 2>/dev/null)" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          npx playwright merge-reports --reporter html,json ./all-blob-reports
          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: Compute summary
        id: summary
        if: steps.merge.outputs.skipped == 'false'
        shell: bash
        run: |
          failed=$(jq '[.suites[]?.suites[]?.specs[]? | select(.tests[]?.results[]?.status=="failed")] | length' test-results/results.json 2>/dev/null || echo 0)
          echo "failed_count=${failed:-0}" >> "$GITHUB_OUTPUT"

      - name: Upload HTML report
        if: steps.merge.outputs.skipped == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30

      - name: Upload JSON results
        if: steps.merge.outputs.skipped == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-json-results
          path: test-results/results.json
          retention-days: 30

  gate:
    name: Result gate
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    outputs:
      status: ${{ steps.eval.outputs.status }}
    steps:
      - id: eval
        shell: bash
        run: |
          test_result="${{ needs.test.result }}"
          echo "test=${test_result}"

          if [ "$test_result" = "failure" ] || [ "$test_result" = "cancelled" ]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "status=success" >> "$GITHUB_OUTPUT"
