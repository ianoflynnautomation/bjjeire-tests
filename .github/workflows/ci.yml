name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: '22'
  SHARDS: 6

jobs:
  lint:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run typecheck
      - run: npx prettier --check .

  test:
    name: 'Playwright — shard ${{ matrix.shard }}/6'
    runs-on: ubuntu-latest
    needs: [lint]

    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --ipc=host

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]

    env:
      CI: 'true'
      APP_ENV: ephemeral
      BASE_URL: ${{ secrets.EPHEMERAL_BASE_URL }}
      API_URL: ${{ secrets.EPHEMERAL_API_URL }}
      MONGO_URL: ${{ secrets.EPHEMERAL_MONGO_URL }}
      MONGO_DB: ${{ secrets.EPHEMERAL_MONGO_DB }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_API_SCOPE: ${{ secrets.AZURE_API_SCOPE }}
      AZURE_AUTHORITY: ${{ secrets.AZURE_AUTHORITY }}

    steps:
      - uses: actions/checkout@v6
      - run: npm ci --ignore-scripts
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - name: Run Playwright tests (shard ${{ matrix.shard }}/${{ env.SHARDS }})
        run: npx playwright test --shard=${{ matrix.shard }}/${{ env.SHARDS }}
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-shard-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1
          if-no-files-found: ignore
      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-shard-${{ matrix.shard }}
          path: test-results/**/*.zip
          retention-days: 7
          if-no-files-found: ignore

  report:
    name: Merge reports
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: mkdir -p all-blob-reports
      - uses: actions/download-artifact@v4
        with:
          pattern: blob-report-shard-*
          merge-multiple: true
          path: all-blob-reports
        continue-on-error: true
      - id: merge
        run: |
          if [ -z "$(ls -A all-blob-reports 2>/dev/null)" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            npx playwright merge-reports --reporter html,json ./all-blob-reports
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload merged HTML report
        if: steps.merge.outputs.skipped == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30
      - name: Upload merged JSON results
        if: steps.merge.outputs.skipped == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-json-results
          path: test-results/results.json
          retention-days: 30

  release-gate:
    name: Pre-release gate
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Require all shards to pass
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Not all shards passed — release blocked."
            exit 1
          fi
          echo "All shards green — release gate open."
