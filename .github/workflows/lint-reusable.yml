name: Lint reusable workflow

on:
  pull_request:
    paths:
      - '.github/workflows/playwright-tests.yml'
      - '.github/workflows/lint-reusable.yml'
      - 'examples/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint + yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          files: .github/workflows/playwright-tests.yml examples/*.yml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yamllint
        run: pip install --quiet yamllint==1.35.1

      - name: Run yamllint
        run: yamllint -c .yamllint.yml .github/workflows/playwright-tests.yml examples/
