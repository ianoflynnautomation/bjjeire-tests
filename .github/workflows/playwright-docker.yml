# Reusable workflow: Docker-provisioned Playwright tests.
#
# Docker provisioning and test execution stay in the same workflow because the
# compose stack must live on the same runner that executes the tests.

name: Playwright Tests (Docker)

on:
  workflow_call:
    inputs:
      compose_file:
        description: 'Path (relative to caller checkout) to docker-compose.yml. Ignored when compose_files is set.'
        type: string
        required: false
        default: 'docker-compose.yml'
      compose_files:
        description: 'Newline-separated list of compose files (relative to caller checkout), stacked left-to-right. Takes precedence over compose_file.'
        type: string
        required: false
        default: ''
      compose_pre_up_script:
        description: 'Path (relative to caller checkout) to a bash script run before docker compose up.'
        type: string
        required: false
        default: ''
      compose_health_url:
        description: 'URL polled until 200-OK before tests start.'
        type: string
        required: false
        default: ''
      seed_data:
        description: 'Run docker compose seeder after startup.'
        type: boolean
        required: false
        default: false
      base_url:
        description: 'BASE_URL for tests.'
        type: string
        required: true
      api_base_url:
        description: 'API_URL for tests.'
        type: string
        required: true
      test_tags:
        description: 'Playwright grep filter, e.g. "@smoke|@regression".'
        type: string
        required: false
        default: '@smoke|@regression'
      shard_total:
        description: 'Number of parallel shards per project.'
        type: number
        required: false
        default: 6
      playwright_projects:
        description: 'JSON array of Playwright project names to run.'
        type: string
        required: false
        default: '["api","chromium-desktop","firefox-desktop","webkit-desktop","chromium-wide","iphone-15","pixel-8"]'
      node_version:
        description: 'Node.js version for setup-node and merge job.'
        type: string
        required: false
        default: '22'
      playwright_image:
        description: 'Container image used for the test runner.'
        type: string
        required: false
        default: 'mcr.microsoft.com/playwright:v1.58.2-noble'
      test_repo:
        description: 'Owner/repo holding the test code.'
        type: string
        required: false
        default: ''
      test_repo_ref:
        description: 'Git ref of the test repo to check out.'
        type: string
        required: false
        default: 'main'

    secrets:
      GHCR_TOKEN:
        required: false
      EPHEMERAL_MONGO_URL:
        required: false
      EPHEMERAL_MONGO_DB:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_CLIENT_SECRET:
        required: false
      AZURE_API_SCOPE:
        required: false
      AZURE_AUTHORITY:
        required: false

    outputs:
      test_status:
        description: 'success | failure — aggregated result of the matrix test job.'
        value: ${{ jobs.gate.outputs.status }}
      failed_count:
        description: 'Number of failed tests across all shards (0 on green).'
        value: ${{ jobs.merge-reports.outputs.failed_count }}
      report_artifact_name:
        description: 'Name of the merged HTML report artifact.'
        value: ${{ jobs.merge-reports.outputs.report_artifact_name }}

permissions:
  contents: read
  id-token: write
  actions: read
  checks: write

jobs:
  setup:
    name: Plan matrix
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.plan.outputs.shard_matrix }}
      project_matrix: ${{ steps.plan.outputs.project_matrix }}
    steps:
      - id: plan
        shell: bash
        run: |
          shards=$(seq 1 ${{ inputs.shard_total }} | jq -R -s -c 'split("\n")[:-1] | map(tonumber)')
          projects='${{ inputs.playwright_projects }}'
          project_matrix=$(echo "${projects}" | jq -c 'map({
            name: .,
            config: (if . == "api" then "playwright.api.config.ts" else "playwright.ui.config.ts" end)
          })')

          echo "shard_matrix=${shards}" >> "$GITHUB_OUTPUT"
          echo "project_matrix=${project_matrix}" >> "$GITHUB_OUTPUT"

  docker-test:
    name: Docker ${{ matrix.project.name }} ${{ matrix.shard }}/${{ inputs.shard_total }}
    runs-on: ubuntu-latest
    needs: [setup]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.setup.outputs.project_matrix) }}
        shard: ${{ fromJson(needs.setup.outputs.shard_matrix) }}
    env:
      CI: 'true'
      APP_ENV: docker
      BASE_URL: ${{ inputs.base_url }}
      API_URL: ${{ inputs.api_base_url }}
      ACCEPT_INVALID_CERTS: 'true'
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      MONGO_URL: ${{ secrets.EPHEMERAL_MONGO_URL }}
      MONGO_DB: ${{ secrets.EPHEMERAL_MONGO_DB }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_API_SCOPE: ${{ secrets.AZURE_API_SCOPE }}
      AZURE_AUTHORITY: ${{ secrets.AZURE_AUTHORITY }}
    steps:
      - name: Checkout caller repo (compose sources)
        uses: actions/checkout@v6

      - name: Login to GHCR
        if: env.GHCR_TOKEN != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Compute compose file args
        id: compose_args
        shell: bash
        run: |
          args=""
          files_input='${{ inputs.compose_files }}'
          if [ -n "${files_input}" ]; then
            while IFS= read -r line; do
              trimmed="$(echo "$line" | xargs)"
              [ -z "$trimmed" ] && continue
              args="${args} -f ${trimmed}"
            done <<< "${files_input}"
          else
            args="-f ${{ inputs.compose_file }}"
          fi
          args="$(echo "$args" | sed 's/^ *//')"
          echo "COMPOSE_ARGS=${args}" >> "$GITHUB_ENV"
          echo "Using: ${args}"

      - name: Run pre-up script
        if: inputs.compose_pre_up_script != ''
        shell: bash
        run: |
          chmod +x "${{ inputs.compose_pre_up_script }}"
          "${{ inputs.compose_pre_up_script }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker compose up (build + wait for healthy)
        shell: bash
        run: |
          docker compose $COMPOSE_ARGS up -d --build --wait --wait-timeout 300
          docker compose $COMPOSE_ARGS ps

      - name: Run Seed Data
        if: inputs.seed_data == true
        shell: bash
        run: |
          docker compose $COMPOSE_ARGS run --rm seeder

      - name: Wait for health URL
        if: inputs.compose_health_url != ''
        shell: bash
        run: |
          url="${{ inputs.compose_health_url }}"
          for i in $(seq 1 60); do
            if curl -fsS --max-time 3 "$url" >/dev/null 2>&1; then
              echo "health OK after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Health check failed for $url within 120s"
          docker compose $COMPOSE_ARGS logs --tail=500 || true
          exit 1

      - name: Checkout test repo
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.test_repo }}
          ref: ${{ inputs.test_repo_ref }}
          path: tests-checkout

      - name: Build test-runner image
        shell: bash
        working-directory: tests-checkout
        run: |
          docker build \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --tag bjjeire-playwright:ci \
            --file Dockerfile \
            .

      - name: Prepare report dirs
        shell: bash
        run: |
          mkdir -p tests-checkout/playwright-report \
                   tests-checkout/test-results \
                   tests-checkout/blob-report \
                   tests-checkout/allure-results

      - name: Run Playwright tests (in container)
        shell: bash
        run: |
          name='${{ matrix.project.name }}'
          config='${{ matrix.project.config }}'

          echo "Running ${name} shard ${{ matrix.shard }}/${{ inputs.shard_total }} with ${config}"

          args=(
            test
            -c "$config"
            --project="$name"
            --shard=${{ matrix.shard }}/${{ inputs.shard_total }}
          )
          if [ -n "${{ inputs.test_tags }}" ]; then
            args+=(--grep="${{ inputs.test_tags }}")
          fi

          docker run --rm \
            --network host \
            --ipc host \
            -v "${{ github.workspace }}/tests-checkout/playwright-report:/home/pwuser/app/playwright-report" \
            -v "${{ github.workspace }}/tests-checkout/test-results:/home/pwuser/app/test-results" \
            -v "${{ github.workspace }}/tests-checkout/blob-report:/home/pwuser/app/blob-report" \
            -v "${{ github.workspace }}/tests-checkout/allure-results:/home/pwuser/app/allure-results" \
            -e CI=true \
            -e APP_ENV="${APP_ENV}" \
            -e BASE_URL="${BASE_URL}" \
            -e API_URL="${API_URL}" \
            -e ACCEPT_INVALID_CERTS="${ACCEPT_INVALID_CERTS}" \
            -e MONGO_URL="${MONGO_URL}" \
            -e MONGO_DB="${MONGO_DB}" \
            -e AZURE_TENANT_ID="${AZURE_TENANT_ID}" \
            -e AZURE_CLIENT_ID="${AZURE_CLIENT_ID}" \
            -e AZURE_CLIENT_SECRET="${AZURE_CLIENT_SECRET}" \
            -e AZURE_API_SCOPE="${AZURE_API_SCOPE}" \
            -e AZURE_AUTHORITY="${AZURE_AUTHORITY}" \
            bjjeire-playwright:ci \
            "${args[@]}"

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.project.name }}-shard-${{ matrix.shard }}-docker
          path: tests-checkout/blob-report/
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: traces-${{ matrix.project.name }}-shard-${{ matrix.shard }}-docker
          path: tests-checkout/test-results/**/*.zip
          retention-days: 7
          if-no-files-found: ignore

      - name: Dump compose logs on failure
        if: failure()
        shell: bash
        run: |
          docker compose $COMPOSE_ARGS ps || true
          docker compose $COMPOSE_ARGS logs --no-color --tail=500 || true

      - name: Docker compose down
        if: always()
        shell: bash
        run: docker compose $COMPOSE_ARGS down -v --remove-orphans || true

  merge-reports:
    name: Merge reports
    runs-on: ubuntu-latest
    needs: [docker-test]
    if: always()
    outputs:
      failed_count: ${{ steps.summary.outputs.failed_count }}
      report_artifact_name: playwright-html-report
    steps:
      - name: Checkout test repo
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.test_repo }}
          ref: ${{ inputs.test_repo_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci --ignore-scripts

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          merge-multiple: true
          path: all-blob-reports
        continue-on-error: true

      - name: Merge into HTML + JSON
        id: merge
        shell: bash
        run: |
          if [ -z "$(ls -A all-blob-reports 2>/dev/null)" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          npx playwright merge-reports --reporter html,json ./all-blob-reports
          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: Compute summary
        id: summary
        if: steps.merge.outputs.skipped == 'false'
        shell: bash
        run: |
          failed=$(jq '[.suites[]?.suites[]?.specs[]? | select(.tests[]?.results[]?.status=="failed")] | length' test-results/results.json 2>/dev/null || echo 0)
          echo "failed_count=${failed:-0}" >> "$GITHUB_OUTPUT"

      - name: Upload HTML report
        if: steps.merge.outputs.skipped == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30

      - name: Upload JSON results
        if: steps.merge.outputs.skipped == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-json-results
          path: test-results/results.json
          retention-days: 30

  gate:
    name: Result gate
    runs-on: ubuntu-latest
    needs: [docker-test]
    if: always()
    outputs:
      status: ${{ steps.eval.outputs.status }}
    steps:
      - id: eval
        shell: bash
        run: |
          docker_result="${{ needs.docker-test.result }}"
          echo "docker-test=${docker_result}"

          if [ "$docker_result" = "failure" ] || [ "$docker_result" = "cancelled" ]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "status=success" >> "$GITHUB_OUTPUT"
